<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IIT AI Coach V4 🚀</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
color:white;
background:
radial-gradient(circle at top left,#38bdf840,transparent 30%),
radial-gradient(circle at top right,#8b5cf640,transparent 30%),
radial-gradient(circle at bottom left,#22c55e30,transparent 35%),
radial-gradient(circle at bottom right,#f9731630,transparent 35%),
#020617;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:400px;
height:400px;
background:#38bdf8;
filter:blur(140px);
top:-120px;
left:-120px;
opacity:0.18;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:350px;
height:350px;
background:#8b5cf6;
filter:blur(140px);
bottom:-120px;
right:-120px;
opacity:0.18;
z-index:-1;
}

header{
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:28px;
font-weight:800;
background:linear-gradient(45deg,#38bdf8,#8b5cf6,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tag{
padding:8px 14px;
background:rgba(17,24,39,0.8);
border-radius:999px;
font-size:13px;
border:1px solid rgba(255,255,255,0.08);
}

.hero{
text-align:center;
padding:35px 8%;
}

.hero h1{
font-size:44px;
font-weight:800;
}

.hero span{
color:#38bdf8;
}

.main{
width:90%;
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:350px 1fr;
gap:22px;
}

.card{
background:rgba(255,255,255,0.06);
padding:22px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(25px);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 50px rgba(56,189,248,0.2);
}

select, textarea{
width:100%;
padding:14px;
margin-top:12px;
border-radius:14px;
border:none;
outline:none;
background:#111827;
color:white;
border:1px solid rgba(255,255,255,0.08);
}

textarea{
height:180px;
resize:none;
}

button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#38bdf8,#8b5cf6,#22c55e);
color:white;
font-weight:800;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.output{
background:#0f172a;
padding:20px;
border-radius:18px;
min-height:520px;
white-space:pre-wrap;
line-height:1.8;
margin-top:12px;
border:1px solid rgba(255,255,255,0.06);
overflow:auto;
}

.loader{
display:none;
margin-top:10px;
color:#38bdf8;
font-weight:700;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:0.4;}
50%{opacity:1;}
100%{opacity:0.4;}
}

@media(max-width:900px){
.main{
grid-template-columns:1fr;
}
.hero h1{
font-size:32px;
}
}

</style>

</head>

<body>

<header>

<div class="logo">🧠 IIT AI Coach V4</div>
<div class="tag">⚡ Solve + Practice + Evaluation</div>

</header>

<div class="hero">
<h1>Solve <span>IIT Problems + Practice Mode</span> 🚀</h1>
</div>

<div class="main">

<div class="card">

<h3>⚡ Input Panel</h3>

<select id="subject">
<option value="physics">Physics</option>
<option value="math">Math</option>
<option value="chemistry">Chemistry</option>
</select>

<textarea id="question" placeholder="Enter IIT problem..."></textarea>

<textarea id="answer" placeholder="Write your answer for AI evaluation..."></textarea>

<button onclick="solveProblem()">🚀 Solve</button>

<button onclick="practiceProblem()">🔥 Solve + Next Practice</button>

<button onclick="evaluateAnswer()">🧠 Evaluate My Answer</button>

<div class="loader" id="loader">
🧠 AI is thinking...
</div>

</div>

<div class="card">

<h3>📘 AI Output</h3>

<div class="output" id="output">
Result will appear here...
</div>

</div>

</div>

<script>

const SOLVE_API = "https://iitpreparation.onrender.com/solve";
const PRACTICE_API = "https://iitpreparation.onrender.com/practice";
const EVALUATE_API = "https://iitpreparation.onrender.com/evaluate";

async function solveProblem(){

let subject = document.getElementById("subject").value;
let question = document.getElementById("question").value;

if(!question){
alert("Enter question");
return;
}

showLoader();

try{

let res = await fetch(SOLVE_API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({subject,question})
});

let data = await res.json();

document.getElementById("output").innerHTML =
marked.parse(data.solution);

}
catch(err){

document.getElementById("output").innerHTML =
"❌ Solve API Error";

}

hideLoader();

}

async function practiceProblem(){

let subject = document.getElementById("subject").value;
let question = document.getElementById("question").value;

if(!question){
alert("Enter question");
return;
}

showLoader();

try{

let res = await fetch(PRACTICE_API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
subject,
question
})
});

let data = await res.json();

document.getElementById("output").innerHTML =
marked.parse(data.result);

}
catch(err){

document.getElementById("output").innerHTML =
"❌ Practice API Error";

}

hideLoader();

}

async function evaluateAnswer(){

let subject = document.getElementById("subject").value;
let question = document.getElementById("question").value;
let answer = document.getElementById("answer").value;

if(!question || !answer){
alert("Enter both question and answer");
return;
}

showLoader();

try{

let res = await fetch(EVALUATE_API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
subject,
question,
student_answer:answer
})
});

let data = await res.json();

document.getElementById("output").innerHTML =
marked.parse(data.result);

}
catch(err){

document.getElementById("output").innerHTML =
"❌ Evaluation API Error";

}

hideLoader();

}

function showLoader(){
document.getElementById("loader").style.display = "block";
document.getElementById("output").innerHTML = "Thinking...";
}

function hideLoader(){
document.getElementById("loader").style.display = "none";
}

</script>

</body>
</html>
