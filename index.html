<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IIT AI Coach V5 🚀</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
color:white;
background:
radial-gradient(circle at top left,#38bdf840,transparent 30%),
radial-gradient(circle at top right,#8b5cf640,transparent 30%),
radial-gradient(circle at bottom left,#22c55e30,transparent 35%),
radial-gradient(circle at bottom right,#f9731630,transparent 35%),
#020617;
overflow-x:hidden;
}

/* Glow Effects */
body::before,
body::after{
content:"";
position:fixed;
filter:blur(140px);
opacity:0.18;
z-index:-1;
}

body::before{
width:420px;
height:420px;
background:#38bdf8;
top:-120px;
left:-120px;
}

body::after{
width:380px;
height:380px;
background:#8b5cf6;
bottom:-120px;
right:-120px;
}

/* Header */

header{
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:30px;
font-weight:800;
background:linear-gradient(45deg,#38bdf8,#8b5cf6,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tag{
padding:10px 16px;
background:rgba(17,24,39,0.8);
border-radius:999px;
font-size:13px;
border:1px solid rgba(255,255,255,0.08);
}

/* Hero */

.hero{
padding:35px 8%;
text-align:center;
}

.hero h1{
font-size:42px;
font-weight:800;
}

.hero span{
color:#38bdf8;
}

.hero p{
opacity:0.8;
margin-top:10px;
}

/* Main Layout */

.main{
width:90%;
max-width:1250px;
margin:auto;
display:grid;
grid-template-columns:360px 1fr;
gap:22px;
padding-bottom:30px;
}

/* Cards */

.card{
background:rgba(255,255,255,0.06);
padding:24px;
border-radius:26px;
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
transition:0.3s;
box-shadow:0 0 30px rgba(0,0,0,0.15);
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 45px rgba(56,189,248,0.12);
}

/* Inputs */

select,
textarea{
width:100%;
padding:14px;
margin-top:12px;
border-radius:16px;
border:none;
outline:none;
background:#111827;
color:white;
border:1px solid rgba(255,255,255,0.08);
font-size:14px;
}

textarea{
resize:none;
}

#question{
height:170px;
}

#answer{
height:120px;
}

/* Output */

#output{
width:100%;
height:560px;
margin-top:12px;
padding:20px;
border-radius:20px;
background:#0f172a;
border:1px solid rgba(255,255,255,0.08);

white-space:pre-wrap;
user-select:text;
-webkit-user-select:text;

resize:none;
font-size:15px;
line-height:1.8;
overflow:auto;
}

/* Buttons */

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:14px;
}

button{
padding:14px;
border:none;
border-radius:16px;
background:linear-gradient(45deg,#38bdf8,#8b5cf6,#22c55e);
color:white;
font-weight:700;
cursor:pointer;
transition:0.25s;
box-shadow:0 0 25px rgba(56,189,248,0.15);
}

button:hover{
transform:translateY(-2px) scale(1.02);
box-shadow:0 0 40px rgba(56,189,248,0.25);
}

/* Loader */

.loader{
display:none;
margin-top:14px;
color:#38bdf8;
font-weight:700;
}

/* Mobile */

@media(max-width:900px){

.main{
grid-template-columns:1fr;
}

.hero h1{
font-size:32px;
}

.buttons{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>

<div class="logo">🧠 IIT AI Coach V5</div>

<div class="tag">
⚡ Solve • Practice • Evaluate • Hint
</div>

</header>

<div class="hero">

<h1>
Build <span>IIT Thinking Skills</span> 🚀
</h1>

<p>
Problem Solving • Guided Hints • AI Evaluation • Adaptive Practice
</p>

</div>

<div class="main">

<!-- INPUT CARD -->

<div class="card">

<h3>⚡ Input Panel</h3>

<select id="subject">

<option value="physics">Physics</option>
<option value="math">Math</option>
<option value="chemistry">Chemistry</option>

</select>

<textarea
id="question"
placeholder="Enter IIT-level problem here..."
></textarea>

<textarea
id="answer"
placeholder="Write your answer for evaluation..."
></textarea>

<div class="buttons">

<button onclick="solve()">
🚀 Solve
</button>

<button onclick="practice()">
🔥 Practice
</button>

<button onclick="evaluateAnswer()">
🧠 Evaluate
</button>

<button onclick="hintMode()">
💡 Hint Mode
</button>

</div>

<div class="loader" id="loader">
🧠 AI is thinking like IIT coach...
</div>

</div>

<!-- OUTPUT CARD -->

<div class="card">

<h3>📘 AI Output (Select & Copy Freely)</h3>

<textarea
id="output"
readonly
placeholder="Your AI result will appear here..."
></textarea>

</div>

</div>

<script>

const SOLVE_API =
"https://iitpreparation.onrender.com/solve";

const PRACTICE_API =
"https://iitpreparation.onrender.com/practice";

const EVALUATE_API =
"https://iitpreparation.onrender.com/evaluate";

const HINT_API =
"https://iitpreparation.onrender.com/hint";

/* Loader */

function showLoader(){

document.getElementById("loader").style.display="block";

}

function hideLoader(){

document.getElementById("loader").style.display="none";

}

/* Solve */

async function solve(){

let subject =
document.getElementById("subject").value;

let question =
document.getElementById("question").value;

if(!question){

alert("Enter question");
return;

}

showLoader();

try{

let res = await fetch(SOLVE_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
subject,
question
})

});

let data = await res.json();

document.getElementById("output").value =
data.solution;

}

catch(err){

document.getElementById("output").value =
"❌ Solve API Error";

}

hideLoader();

}

/* Practice */

async function practice(){

let subject =
document.getElementById("subject").value;

let question =
document.getElementById("question").value;

if(!question){

alert("Enter question");
return;

}

showLoader();

try{

let res = await fetch(PRACTICE_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
subject,
question
})

});

let data = await res.json();

document.getElementById("output").value =
data.result;

}

catch(err){

document.getElementById("output").value =
"❌ Practice API Error";

}

hideLoader();

}

/* Evaluation */

async function evaluateAnswer(){

let subject =
document.getElementById("subject").value;

let question =
document.getElementById("question").value;

let answer =
document.getElementById("answer").value;

if(!question || !answer){

alert("Enter both question and answer");
return;

}

showLoader();

try{

let res = await fetch(EVALUATE_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

subject,
question,
student_answer:answer

})

});

let data = await res.json();

document.getElementById("output").value =
data.result;

}

catch(err){

document.getElementById("output").value =
"❌ Evaluation API Error";

}

hideLoader();

}

/* Hint Mode */

async function hintMode(){

let subject =
document.getElementById("subject").value;

let question =
document.getElementById("question").value;

if(!question){

alert("Enter question");
return;

}

showLoader();

try{

let res = await fetch(HINT_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
subject,
question
})

});

let data = await res.json();

document.getElementById("output").value =
data.result;

}

catch(err){

document.getElementById("output").value =
"❌ Hint API Error";

}

hideLoader();

}

</script>

</body>
</html>
