<!DOCTYPE html>
<html>
<head>
<title>IIT AI Coach SaaS 🚀</title>

<style>
body{
margin:0;
font-family:Poppins;
display:flex;
height:100vh;
background:#0b1020;
color:white;
}

.sidebar{
width:220px;
background:#111827;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
}

.btn{
display:block;
margin-top:10px;
padding:10px;
background:#1f2937;
border:none;
color:white;
width:100%;
border-radius:10px;
cursor:pointer;
}

.main{
flex:1;
padding:20px;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
background:#111827;
color:white;
border:none;
padding:10px;
border-radius:10px;
}

.output{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:10px;
min-height:300px;
white-space:pre-wrap;
}

button{
margin-top:10px;
padding:12px;
background:#38bdf8;
border:none;
color:black;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>⚡ IIT AI</h2>

<button class="btn">Solve</button>
<button class="btn">Hint</button>
<button class="btn">Practice</button>
<button class="btn">Evaluate</button>

</div>

<div class="main">

<h3>Ask Your Problem</h3>

<textarea id="q"></textarea>

<button onclick="solve()">🚀 Solve</button>

<div class="output" id="out">Result...</div>

</div>

<script>

async function solve(){

let q=document.getElementById("q").value;

let res=await fetch("https://iitpreparation.onrender.com/solve",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
subject:"physics",
question:q
})
});

let data=await res.json();

document.getElementById("out").innerText=data.result;

}

</script>

</body>
</html>
