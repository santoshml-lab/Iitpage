<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>IIT AI Coach V7 Ultra 🚀</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
radial-gradient(circle at top left,#38bdf820,transparent 25%),
radial-gradient(circle at bottom right,#8b5cf620,transparent 25%),
#020617;

color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(22px);
border-right:1px solid rgba(255,255,255,0.08);
padding:24px;
display:flex;
flex-direction:column;
gap:14px;
}

.logo{
font-size:30px;
font-weight:800;
background:linear-gradient(45deg,#38bdf8,#8b5cf6,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:20px;
}

.sidebar button{
padding:14px;
border:none;
border-radius:14px;
background:#111827;
color:white;
cursor:pointer;
font-size:15px;
font-weight:600;
transition:0.25s;
border:1px solid rgba(255,255,255,0.06);
}

.sidebar button:hover{
transform:translateX(6px);
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
box-shadow:0 0 25px rgba(56,189,248,0.25);
}

/* MAIN */
.main{
flex:1;
padding:22px;
display:flex;
flex-direction:column;
gap:16px;
overflow:hidden;
}

/* TOP */
.top{
display:flex;
gap:14px;
}

select{
padding:14px;
border:none;
border-radius:14px;
background:#111827;
color:white;
font-size:15px;
outline:none;
min-width:200px;
border:1px solid rgba(255,255,255,0.06);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

/* TEXTAREAS */
textarea{
width:100%;
height:180px;
padding:18px;
border:none;
outline:none;
resize:none;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
color:white;
font-size:15px;
line-height:1.6;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

textarea:focus{
border:1px solid #38bdf8;
box-shadow:0 0 20px rgba(56,189,248,0.2);
}

/* BUTTON */
.run-wrap{
display:flex;
justify-content:flex-end;
}

.run-btn{
padding:14px 28px;
border:none;
border-radius:16px;
font-size:16px;
font-weight:700;
cursor:pointer;
background:linear-gradient(45deg,#38bdf8,#8b5cf6,#22c55e);
color:white;
transition:0.3s;
box-shadow:0 0 30px rgba(56,189,248,0.25);
}

.run-btn:hover{
transform:scale(1.05);
box-shadow:0 0 45px rgba(56,189,248,0.45);
}

/* OUTPUT */
.output{
flex:1;
overflow:auto;
padding:24px;
border-radius:22px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,0.08);
font-size:17px;
line-height:1.9;
}

.output h1,
.output h2,
.output h3{
color:#38bdf8;
margin:14px 0;
}

.output p{
margin:12px 0;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.03);
border-left:3px solid #38bdf8;
}

/* LOADER */
.loader{
display:none;
font-weight:700;
color:#38bdf8;
}

/* MOBILE */
@media(max-width:950px){
body{flex-direction:column;}
.sidebar{
width:100%;
flex-direction:row;
overflow:auto;
}
.grid{grid-template-columns:1fr;}
}

</style></head><body><div class="sidebar">
<div class="logo">🧠 IIT AI</div><button onclick="setMode('solve')">🚀 Solve</button>
<button onclick="setMode('hint')">💡 Hint</button>
<button onclick="setMode('practice')">🔥 Practice</button>
<button onclick="setMode('evaluate')">🧠 Evaluate</button>
<button onclick="setMode('summary')">📌 Summary</button>

</div><div class="main"><div class="top">
<select id="subject">
<option>Physics</option>
<option>Math</option>
<option>Chemistry</option>
</select>
</div><div class="grid">
<textarea id="question" placeholder="Enter IIT-level problem..."></textarea>
<textarea id="answer" placeholder="Write student answer for evaluation..."></textarea>
</div><div class="run-wrap">
<button class="run-btn" onclick="run()">⚡ Run AI</button>
</div><div class="loader" id="loader">
🧠 AI thinking like IIT mentor...
</div><div class="output" id="output">
✨ Welcome to IIT AI Coach Ultra Premium
</div></div><script>

let mode="solve";

function setMode(m){
mode=m;
document.getElementById("output").innerHTML=
`<h2>⚡ Mode: ${m}</h2>`;
}

const API={
solve:"https://iitpreparation.onrender.com/solve",
hint:"https://iitpreparation.onrender.com/hint",
practice:"https://iitpreparation.onrender.com/practice",
evaluate:"https://iitpreparation.onrender.com/evaluate",
summary:"https://iitpreparation.onrender.com/summary"
};

function showLoader(){
document.getElementById("loader").style.display="block";
}

function hideLoader(){
document.getElementById("loader").style.display="none";
}

async function run(){

let subject=document.getElementById("subject").value;
let question=document.getElementById("question").value;
let answer=document.getElementById("answer").value;

if(!question){
alert("Enter question");
return;
}

showLoader();

try{

let res=await fetch(API[mode],{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
subject,
question,
student_answer:answer
})
});

let data=await res.json();

document.getElementById("output").innerHTML=
marked.parse(data.solution || data.result || "No response");

}catch(err){
document.getElementById("output").innerHTML=
`<h2>❌ Error</h2><p>Backend issue</p>`;
}

hideLoader();
}

</script></body>
</html>
