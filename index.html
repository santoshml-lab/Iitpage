<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IIT AI Coach V3 🚀</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

/* BASE */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
color:white;

/* 🌈 PREMIUM GRADIENT LIGHT BACKGROUND */
background:
radial-gradient(circle at top left,#38bdf840,transparent 30%),
radial-gradient(circle at top right,#8b5cf640,transparent 30%),
radial-gradient(circle at bottom left,#22c55e30,transparent 35%),
radial-gradient(circle at bottom right,#f9731630,transparent 35%),
#020617;

overflow-x:hidden;
}

/* FLOATING GLOW EFFECT */
body::before{
content:"";
position:fixed;
width:400px;
height:400px;
background:#38bdf8;
filter:blur(140px);
top:-120px;
left:-120px;
opacity:0.18;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:350px;
height:350px;
background:#8b5cf6;
filter:blur(140px);
bottom:-120px;
right:-120px;
opacity:0.18;
z-index:-1;
}

/* HEADER */
header{
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:28px;
font-weight:800;
background:linear-gradient(45deg,#38bdf8,#8b5cf6,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:1px;
}

.tag{
padding:8px 14px;
background:rgba(17,24,39,0.8);
border:1px solid rgba(255,255,255,0.08);
border-radius:999px;
font-size:13px;
}

/* HERO */
.hero{
text-align:center;
padding:35px 8%;
}

.hero h1{
font-size:44px;
font-weight:800;
}

.hero span{
color:#38bdf8;
text-shadow:0 0 20px rgba(56,189,248,0.5);
}

.hero p{
opacity:0.85;
margin-top:10px;
}

/* MAIN */
.main{
width:90%;
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:350px 1fr;
gap:22px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
padding:22px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(25px);
box-shadow:0 0 30px rgba(56,189,248,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 50px rgba(56,189,248,0.2);
}

/* INPUT */
select, textarea{
width:100%;
padding:14px;
margin-top:12px;
border-radius:14px;
border:none;
outline:none;
background:#111827;
color:white;
border:1px solid rgba(255,255,255,0.08);
}

textarea{
height:200px;
resize:none;
}

/* BUTTON */
button{
width:100%;
padding:15px;
margin-top:14px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#38bdf8,#8b5cf6,#22c55e);
color:white;
font-weight:800;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 25px rgba(56,189,248,0.25);
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 45px rgba(56,189,248,0.4);
}

/* OUTPUT */
.output{
background:#0f172a;
padding:20px;
border-radius:18px;
min-height:550px;
white-space:pre-wrap;
line-height:1.8;
margin-top:12px;
border:1px solid rgba(255,255,255,0.06);
overflow:auto;
}

/* LOADER */
.loader{
display:none;
margin-top:10px;
color:#38bdf8;
font-weight:700;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:0.4;}
50%{opacity:1;}
100%{opacity:0.4;}
}

/* MOBILE */
@media(max-width:900px){
.main{
grid-template-columns:1fr;
}
.hero h1{
font-size:32px;
}
}

</style>

</head>

<body>

<header>

<div class="logo">🧠 IIT AI Coach V3</div>
<div class="tag">⚡ Premium Gradient Learning System</div>

</header>

<div class="hero">

<h1>
Solve <span>IIT Level Problems</span> 🚀
</h1>

<p>
Physics • Math • Chemistry | AI Powered Coaching Engine
</p>

</div>

<div class="main">

<div class="card">

<h3>⚡ Input Panel</h3>

<select id="subject">
<option value="physics">Physics</option>
<option value="math">Math</option>
<option value="chemistry">Chemistry</option>
</select>

<textarea id="question" placeholder="Enter your IIT level problem here..."></textarea>

<button onclick="solve()">🚀 Solve Problem</button>

<div class="loader" id="loader">
🧠 AI is thinking like IIT coach...
</div>

</div>

<div class="card">

<h3>📘 AI Solution</h3>

<div class="output" id="output">
Your solution will appear here...
</div>

</div>

</div>

<script>

const API = "https://iitpreparation.onrender.com/solve";

async function solve(){

let subject = document.getElementById("subject").value;
let question = document.getElementById("question").value;

if(!question){
alert("Please enter a question");
return;
}

document.getElementById("loader").style.display = "block";
document.getElementById("output").innerHTML = "Solving...";

try{

let res = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
subject:subject,
question:question
})
});

let data = await res.json();

document.getElementById("output").innerHTML =
marked.parse(data.solution);

}
catch(err){
document.getElementById("output").innerHTML =
"❌ Server Error / API Not Responding";
}
finally{
document.getElementById("loader").style.display = "none";
}

}

</script>

</body>
</html>
