
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIT AI Coach SaaS 🚀</title>

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:#0b1020;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#111827;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar button{
padding:10px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
cursor:pointer;
}

/* MAIN */
.main{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

textarea,select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#111827;
color:white;
resize:none;
outline:none;
}

textarea{
height:140px;
}

/* OUTPUT */
.output{
flex:1;
background:#0f172a;
padding:15px;
border-radius:12px;
overflow:auto;
white-space:pre-wrap;
border:1px solid rgba(255,255,255,0.1);
}

/* BUTTON ROW */
.btns{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#38bdf8,#8b5cf6,#22c55e);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.03);
}

</style>
</head>

<body>

<div class="sidebar">
<h2>🧠 IIT AI</h2>

<button onclick="setMode('solve')">🚀 Solve</button>
<button onclick="setMode('hint')">💡 Hint</button>
<button onclick="setMode('practice')">🔥 Practice</button>
<button onclick="setMode('evaluate')">🧠 Evaluate</button>
<button onclick="setMode('summary')">📌 Summary</button>

</div>

<div class="main">

<select id="subject">
<option>Physics</option>
<option>Math</option>
<option>Chemistry</option>
</select>

<div class="grid">

<textarea id="question" placeholder="Enter question..."></textarea>
<textarea id="answer" placeholder="Enter answer (for evaluation)..."></textarea>

</div>

<div class="btns">

<button onclick="run()">⚡ Run</button>

</div>

<div class="output" id="output">
Output will appear here...
</div>

</div>

<script>

let mode="solve";

function setMode(m){
mode=m;
document.getElementById("output").innerText="Mode set to: "+m;
}

/* API */
const API={
solve:"https://iitpreparation.onrender.com/solve",
hint:"https://iitpreparation.onrender.com/hint",
practice:"https://iitpreparation.onrender.com/practice",
evaluate:"https://iitpreparation.onrender.com/evaluate",
summary:"https://iitpreparation.onrender.com/summary"
};

async function run(){

let subject=document.getElementById("subject").value;
let question=document.getElementById("question").value;
let answer=document.getElementById("answer").value;

if(!question){
alert("Enter question");
return;
}

let body={subject,question,student_answer:answer};

let url=API[mode];

document.getElementById("output").innerText="Thinking...";

let res=await fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(body)
});

let data=await res.json();

/* safe output mapping */
document.getElementById("output").innerText =
data.solution || data.result || "No response";

}

</script>

</body>
</html>
