<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IIT AI Coach V4 🚀</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
color:white;
background:
radial-gradient(circle at top left,#38bdf840,transparent 30%),
radial-gradient(circle at top right,#8b5cf640,transparent 30%),
radial-gradient(circle at bottom left,#22c55e30,transparent 35%),
radial-gradient(circle at bottom right,#f9731630,transparent 35%),
#020617;
overflow-x:hidden;
}

/* glow */
body::before,
body::after{
content:"";
position:fixed;
filter:blur(140px);
opacity:0.18;
z-index:-1;
}

body::before{
width:400px;height:400px;
background:#38bdf8;
top:-120px;left:-120px;
}

body::after{
width:350px;height:350px;
background:#8b5cf6;
bottom:-120px;right:-120px;
}

/* header */
header{
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px);
}

.logo{
font-size:28px;
font-weight:800;
background:linear-gradient(45deg,#38bdf8,#8b5cf6,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tag{
padding:8px 14px;
background:rgba(17,24,39,0.8);
border-radius:999px;
font-size:13px;
}

/* layout */
.main{
width:90%;
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:350px 1fr;
gap:22px;
padding-top:20px;
}

.card{
background:rgba(255,255,255,0.06);
padding:22px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(25px);
}

.card:hover{
transform:translateY(-5px);
transition:0.3s;
}

/* input */
select, textarea{
width:100%;
padding:14px;
margin-top:12px;
border-radius:14px;
border:none;
outline:none;
background:#111827;
color:white;
}

textarea{
height:180px;
resize:none;
}

/* buttons */
button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#38bdf8,#8b5cf6,#22c55e);
color:white;
font-weight:800;
cursor:pointer;
}

/* OUTPUT (IMPORTANT FIX) */
.output{
background:#0f172a;
padding:18px;
border-radius:18px;
min-height:520px;
white-space:pre-wrap;

/* 🔥 COPY FIX */
user-select:text;
-webkit-user-select:text;
overflow:auto;
}

/* loader */
.loader{
display:none;
margin-top:10px;
color:#38bdf8;
font-weight:700;
}

@media(max-width:900px){
.main{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<header>
<div class="logo">🧠 IIT AI Coach V4</div>
<div class="tag">⚡ Solve + Practice + Evaluate</div>
</header>

<div class="main">

<!-- INPUT -->
<div class="card">

<h3>⚡ Input</h3>

<select id="subject">
<option value="physics">Physics</option>
<option value="math">Math</option>
<option value="chemistry">Chemistry</option>
</select>

<textarea id="question" placeholder="Enter question..."></textarea>

<textarea id="answer" placeholder="Write answer for evaluation..."></textarea>

<button onclick="solveProblem()">🚀 Solve</button>
<button onclick="practiceProblem()">🔥 Practice</button>
<button onclick="evaluateAnswer()">🧠 Evaluate</button>
<button onclick="copyOutput()">📋 Copy Answer</button>

<div class="loader" id="loader">🧠 AI thinking...</div>

</div>

<!-- OUTPUT -->
<div class="card">

<h3>📘 Output</h3>

<div class="output" id="output">Result will appear here...</div>

</div>

</div>

<script>

const SOLVE_API = "https://iitpreparation.onrender.com/solve";
const PRACTICE_API = "https://iitpreparation.onrender.com/practice";
const EVALUATE_API = "https://iitpreparation.onrender.com/evaluate";

function showLoader(){
document.getElementById("loader").style.display="block";
}

function hideLoader(){
document.getElementById("loader").style.display="none";
}

/* ================= COPY FIX ================= */
function copyOutput(){
const text = document.getElementById("output").innerText;
navigator.clipboard.writeText(text)
.then(()=>alert("Copied 🚀"))
.catch(()=>alert("Copy failed"));
}

/* ================= SOLVE ================= */
async function solveProblem(){

let subject=document.getElementById("subject").value;
let question=document.getElementById("question").value;

if(!question){
alert("Enter question");
return;
}

showLoader();

let res=await fetch(SOLVE_API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({subject,question})
});

let data=await res.json();

document.getElementById("output").innerText=data.solution;

hideLoader();
}

/* ================= PRACTICE ================= */
async function practiceProblem(){

let subject=document.getElementById("subject").value;
let question=document.getElementById("question").value;

if(!question){
alert("Enter question");
return;
}

showLoader();

let res=await fetch(PRACTICE_API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({subject,question})
});

let data=await res.json();

document.getElementById("output").innerText=data.result;

hideLoader();
}

/* ================= EVALUATE ================= */
async function evaluateAnswer(){

let subject=document.getElementById("subject").value;
let question=document.getElementById("question").value;
let answer=document.getElementById("answer").value;

if(!question || !answer){
alert("Enter question + answer");
return;
}

showLoader();

let res=await fetch(EVALUATE_API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
subject,
question,
student_answer:answer
})
});

let data=await res.json();

document.getElementById("output").innerText=data.result;

hideLoader();
}

</script>

</body>
</html>
